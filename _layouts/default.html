<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="{{ '/' | relative_url }}" class="nav-logo">
        <span class="nav-logo-icon">L</span>
        <span class="nav-logo-text">Louis You</span>
      </a>
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}" class="nav-link {% if page.url == '/' %}active{% endif %}">Home</a>
        <a href="{{ '/projects/' | relative_url }}" class="nav-link {% if page.url == '/projects/' %}active{% endif %}">Projects</a>
        <a href="{{ '/about/' | relative_url }}" class="nav-link {% if page.url == '/about/' %}active{% endif %}">About</a>
        <a href="https://github.com/louisyouyou" class="nav-link nav-link-external" target="_blank" rel="noopener">GitHub</a>
      </div>
      <button class="nav-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Mobile menu -->
  <div class="mobile-menu">
    <a href="{{ '/' | relative_url }}" class="mobile-menu-link {% if page.url == '/' %}active{% endif %}">Home</a>
    <a href="{{ '/projects/' | relative_url }}" class="mobile-menu-link {% if page.url == '/projects/' %}active{% endif %}">Projects</a>
    <a href="{{ '/about/' | relative_url }}" class="mobile-menu-link {% if page.url == '/about/' %}active{% endif %}">About</a>
    <a href="https://github.com/louisyouyou" class="mobile-menu-link" target="_blank" rel="noopener">GitHub</a>
  </div>

  <!-- Main content -->
  <main class="main">
    <div class="container">
      {{ content }}
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-brand">
          <span class="footer-logo">Louis You</span>
          <p class="footer-tagline">AIoT / Embedded / Linux / AI</p>
        </div>
        <div class="footer-links">
          <a href="https://github.com/louisyouyou" target="_blank" rel="noopener">GitHub</a>
          <a href="mailto:louis.icanhelp@gmail.com">Email</a>
        </div>
      </div>
      <div class="footer-copy">&copy; {{ 'now' | date: '%Y' }} Louis You. All rights reserved.</div>
    </div>
  </footer>

  <script>
    // Mobile menu toggle
    const toggle = document.querySelector('.nav-toggle');
    const mobileMenu = document.querySelector('.mobile-menu');
    if (toggle) {
      toggle.addEventListener('click', () => {
        toggle.classList.toggle('open');
        mobileMenu.classList.toggle('open');
      });
    }

    // Close mobile menu on link click
    document.querySelectorAll('.mobile-menu-link').forEach(link => {
      link.addEventListener('click', () => {
        toggle.classList.remove('open');
        mobileMenu.classList.remove('open');
      });
    });

    // Scroll-based nav shadow
    const nav = document.querySelector('.nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 10);
    });
  </script>

</body>
</html>
